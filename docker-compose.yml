version: "3.7"

services:

  # ── Fractal Bitcoin full node ──────────────────────────────────────────────
  fractal-node:
    image: fractalbitcoin/fractal:v0.2.1
    container_name: fractal_node
    restart: unless-stopped

    entrypoint:
      - "bitcoind"
      - "-datadir=/data"
      - "-conf=/data/bitcoin.conf"
      - "-maxtipage=504576000"

    volumes:
      - ${APP_DATA_DIR}/data:/data

    ports:
      # P2P port — expose to LAN for peer discovery
      - "8333:8333"
      # RPC port — only bind to Docker network (dashboard proxies it to the UI)
      - "127.0.0.1:10332:10332"

    networks:
      - fractal_net

    healthcheck:
      test: ["CMD", "bitcoin-cli", "-datadir=/data", "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Web dashboard & RPC proxy ──────────────────────────────────────────────
  fractal-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: fractal-bitcoin-dashboard:local
    container_name: fractal_dashboard
    restart: unless-stopped

    depends_on:
      - fractal-node

    environment:
      FRACTAL_RPC_HOST: fractal-node
      FRACTAL_RPC_PORT: "10332"
      FRACTAL_RPC_USER: fractal
      FRACTAL_RPC_PASS: fractal_umbrel_node
      DASHBOARD_PORT: "8380"

    ports:
      - "${APP_PORT}:8380"

    networks:
      - fractal_net

networks:
  fractal_net:
    driver: bridge
