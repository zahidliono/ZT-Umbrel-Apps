manifestVersion: 1
id: fractal-store-solo-node
name: Fractal Bitcoin Node
tagline: Full node + solo mining RPC endpoint for SHA-256 ASICs
icon: icon.svg
category: Cryptocurrency
version: "0.2.1"
port: 8380
description: >-
  Run a full Fractal Bitcoin (FB) node on your Umbrel. Fractal Bitcoin is a
  Bitcoin scaling sidechain using SHA-256 Proof-of-Work with ~30 second block
  times.

  This app runs fractald (Bitcoin Core fork) with JSON-RPC enabled so you
  can point any SHA-256 ASIC miner or cpuminer directly at your own node for
  sovereign solo mining.

  Features:
  ‣ Full Fractal Bitcoin mainnet node (fractald v0.2.1)
  ‣ JSON-RPC on port 10332 for miner connection (GBT / getblocktemplate)
  ‣ Supports merged mining (AuxPoW, ChainID 0x2024)
  ‣ Web dashboard at port 8380 showing live sync, peers, difficulty
  ‣ Copy-paste miner commands pre-filled for cpuminer, CGMiner, BFGMiner
  ‣ Pruned mode (~10 GB) by default — configurable to full archival

  Requirements: ~10 GB disk space, ~512 MB RAM. Initial sync takes several
  hours. Solo mining requires competitive SHA-256 ASIC hashpower to find blocks.

developer: Community
website: https://fractalbitcoin.io
dependencies: []
repo: https://github.com/fractal-bitcoin/fractald-release
support: https://docs.fractalbitcoin.io
