# Fractal Bitcoin Node Configuration
# Auto-used by fractald via -conf=/data/bitcoin.conf

# Network
maxtipage=504576000
maxconnections=25

# RPC Server (required for mining software)
server=1
rpcuser=fractal
rpcpassword=fractal_umbrel_node
rpcallowip=0.0.0.0/0
rpcbind=0.0.0.0
rpcport=10332

# Indexing
txindex=0

# Pruning (~10 GB). Set prune=0 for full archival node (100+ GB)
prune=10000

# Logging
logtimestamps=1
logips=0
