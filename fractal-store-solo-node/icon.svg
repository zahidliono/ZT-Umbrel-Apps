<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background -->
  <rect width="256" height="256" fill="#0d0d0d"/>

  <!-- Outer fractal hexagon glow ring -->
  <polygon points="128,18 218,68 218,188 128,238 38,188 38,68"
    fill="none" stroke="#f7931a" stroke-width="6" opacity="0.25"/>

  <!-- Mid fractal ring -->
  <polygon points="128,42 198,82 198,174 128,214 58,174 58,82"
    fill="none" stroke="#f7931a" stroke-width="4" opacity="0.45"/>

  <!-- Inner filled hexagon -->
  <polygon points="128,66 178,96 178,156 128,186 78,156 78,96"
    fill="#1a1000"/>
  <polygon points="128,66 178,96 178,156 128,186 78,156 78,96"
    fill="none" stroke="#f7931a" stroke-width="3" opacity="0.9"/>

  <!-- Bitcoin ₿ symbol, centered -->
  <text x="128" y="149"
    font-family="Arial, Helvetica, sans-serif"
    font-size="82"
    font-weight="bold"
    fill="#f7931a"
    text-anchor="middle"
    dominant-baseline="auto">₿</text>

  <!-- "FB" subtitle label -->
  <text x="128" y="210"
    font-family="Arial, Helvetica, sans-serif"
    font-size="22"
    font-weight="700"
    fill="#f7931a"
    opacity="0.7"
    text-anchor="middle"
    letter-spacing="6">FRACTAL</text>
</svg>
